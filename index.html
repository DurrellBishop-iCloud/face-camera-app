<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Face Camera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #6366f1;
      --accent2: #818cf8;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --bar-h: 80px;
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
    }

    #video, #canvas {
      position: fixed; top: 0; left: 0; right: 0;
      bottom: calc(var(--bar-h) + var(--safe-bottom));
      width: 100%;
      height: calc(100% - var(--bar-h) - var(--safe-bottom));
      object-fit: cover;
      transform: scaleX(-1);
    }
    #video { display: none; }
    #video.active { display: block; }
    #video.hidden { opacity: 0; }
    #canvas { pointer-events: none; display: none; }
    #canvas.active { display: block; }

    /* ── Tap to start ── */
    .tap-overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, rgba(99,102,241,0.12) 0%, rgba(0,0,0,0.9) 70%);
      z-index: 200; cursor: pointer;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .tap-overlay.visible { opacity: 1; pointer-events: all; }
    .tap-ring {
      width: 100px; height: 100px;
      border: 1.5px solid rgba(99,102,241,0.4);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      animation: breathe 2.5s ease-in-out infinite;
    }
    @keyframes breathe { 0%,100%{transform:scale(1);opacity:0.7} 50%{transform:scale(1.08);opacity:1} }
    .tap-ring svg { width: 32px; height: 32px; color: var(--accent2); }
    .tap-text {
      margin-top: 1.2rem;
      font-size: 0.8rem; font-weight: 500;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    /* ── Error ── */
    .error-overlay {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.88); z-index: 190;
      gap: 1rem; padding: 2rem; text-align: center;
    }
    .error-overlay.visible { display: flex; }
    .error-overlay .err-msg { color: #f87171; font-size: 0.95rem; max-width: 300px; line-height: 1.5; }
    .error-overlay .retry-btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: 100px; padding: 0.6rem 1.5rem;
      font-family: inherit; font-size: 0.9rem; font-weight: 500; cursor: pointer;
    }

    /* ── Bottom bar ── */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(var(--bar-h) + var(--safe-bottom));
      z-index: 100;
      background: #000;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 14px;
      gap: 12px;
    }

    .pill {
      height: 44px;
      min-width: 44px;
      padding: 0 18px;
      border-radius: 22px;
      border: 1.5px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.45);
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
    .pill:active { transform: scale(0.93); }

    .pill.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 12px rgba(99,102,241,0.4);
    }
    .pill.on {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.25);
      color: #fff;
    }
    .pill.action {
      border-color: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.35);
    }
    .pill.action:active {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }
  </style>
</head>
<body>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="tapOverlay" class="tap-overlay">
    <div class="tap-ring">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
      </svg>
    </div>
    <p class="tap-text">tap to start</p>
  </div>

  <div id="errorOverlay" class="error-overlay">
    <p style="font-size:2rem">⚠</p>
    <p id="errorText" class="err-msg"></p>
    <button class="retry-btn" id="retryBtn">Try again</button>
  </div>

  <div class="bottom-bar" id="bottomBar">
    <button class="pill selected" id="btnFace">Face</button>
    <button class="pill" id="btnGray">Gray</button>
    <button class="pill on" id="btnCamera">Camera</button>
    <button class="pill on" id="btnLines">Lines</button>
    <button class="pill action" id="btnDrop">Drop</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js" crossorigin="anonymous"></script>
  <script type="module">
    let FaceLandmarker = null, FilesetResolver = null, Delaunay = null;
    const Matter = globalThis.Matter;
    const Engine = Matter?.Engine, World = Matter?.World, Bodies = Matter?.Bodies, Body = Matter?.Body;

    const video  = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    const tapOverlay   = document.getElementById('tapOverlay');
    const errorOverlay = document.getElementById('errorOverlay');
    const errorText    = document.getElementById('errorText');
    const retryBtn     = document.getElementById('retryBtn');
    const bottomBar    = document.getElementById('bottomBar');
    const btnFace   = document.getElementById('btnFace');
    const btnGray   = document.getElementById('btnGray');
    const btnCamera = document.getElementById('btnCamera');
    const btnLines  = document.getElementById('btnLines');
    const btnDrop   = document.getElementById('btnDrop');

    let stream = null, faceLandmarker = null, detectInterval = null, lastVideoTime = -1;
    let lastPointsForPhysics = null, physicsActive = false;
    let matterEngine = null, matterWorld = null;
    let sampleCanvas = null, sampleCtx = null;

    let mode = 'face';
    let showCamera = true;
    let showLines = true;

    function log(m) { try { console.log('[FC]', m); } catch(e){} }

    function getGroundY() {
      return canvas.height;
    }

    // ── Bar buttons ─────────────────────────────────
    function updateBar() {
      btnFace.classList.toggle('selected', mode === 'face');
      btnGray.classList.toggle('selected', mode === 'gray');
      btnFace.classList.remove('on');
      btnGray.classList.remove('on');
      btnCamera.classList.toggle('on', showCamera);
      btnCamera.classList.remove('selected');
      btnLines.classList.toggle('on', showLines);
      btnLines.classList.remove('selected');
    }

    btnFace.addEventListener('click', e => { e.stopPropagation(); mode = 'face'; updateBar(); });
    btnGray.addEventListener('click', e => { e.stopPropagation(); mode = 'gray'; updateBar(); });
    btnCamera.addEventListener('click', e => {
      e.stopPropagation();
      showCamera = !showCamera;
      video.classList.toggle('hidden', !showCamera);
      updateBar();
    });
    btnLines.addEventListener('click', e => { e.stopPropagation(); showLines = !showLines; updateBar(); });
    btnDrop.addEventListener('click', e => { e.stopPropagation(); createPhysicsBodiesFromMesh(); });

    document.addEventListener('click', e => {
      if (tapOverlay.classList.contains('visible')) return;
      if (errorOverlay.classList.contains('visible')) return;
      if (e.target.closest('.bottom-bar') || e.target.closest('.retry-btn')) return;
      createPhysicsBodiesFromMesh();
    });

    // ── Deps ─────────────────────────────────────────
    async function loadDeps() {
      if (FaceLandmarker && Delaunay) return true;
      try {
        const v = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs');
        FaceLandmarker = v.FaceLandmarker; FilesetResolver = v.FilesetResolver;
      } catch(e) { log('MediaPipe fail: '+e.message); }
      try {
        const d = await import('https://cdn.skypack.dev/d3-delaunay@6');
        Delaunay = d.Delaunay;
      } catch(e) { log('Delaunay fail: '+e.message); }
      return !!(FaceLandmarker && Delaunay);
    }

    // ── Canvas ───────────────────────────────────────
    function resizeCanvas() {
      const w = window.innerWidth;
      const barH = bottomBar.offsetHeight;
      const h = window.innerHeight - barH;
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w; canvas.height = h;
      }
    }
    window.addEventListener('resize', resizeCanvas);

    function ensureSampleCanvas() {
      const vw = video.videoWidth, vh = video.videoHeight;
      if (!vw || !vh) return false;
      if (!sampleCanvas || sampleCanvas.width !== vw || sampleCanvas.height !== vh) {
        sampleCanvas = document.createElement('canvas');
        sampleCanvas.width = vw; sampleCanvas.height = vh;
        sampleCtx = sampleCanvas.getContext('2d');
      }
      sampleCtx.drawImage(video, 0, 0, vw, vh);
      return true;
    }

    function sampleVideoAtCanvasPoint(cx, cy) {
      const vw = video.videoWidth, vh = video.videoHeight;
      if (!sampleCanvas || !sampleCtx || !vw || !vh) return null;
      const sc = Math.max(canvas.width/vw, canvas.height/vh);
      const ox = (canvas.width - vw*sc)/2, oy = (canvas.height - vh*sc)/2;
      const x = Math.floor(Math.max(0, Math.min(vw-1, (cx-ox)/sc)));
      const y = Math.floor(Math.max(0, Math.min(vh-1, (cy-oy)/sc)));
      const d = sampleCtx.getImageData(x,y,1,1).data;
      return 'rgb('+d[0]+','+d[1]+','+d[2]+')';
    }

    function keypointsToCanvas(kps) {
      const vw = video.videoWidth, vh = video.videoHeight;
      if (!vw || !vh) return kps.map(k => ({x:k.x*canvas.width, y:k.y*canvas.height}));
      const sc = Math.max(canvas.width/vw, canvas.height/vh);
      const ox = (canvas.width - vw*sc)/2, oy = (canvas.height - vh*sc)/2;
      return kps.map(k => {
        const nx = k.x > 1 ? k.x/vw : k.x, ny = k.y > 1 ? k.y/vh : k.y;
        return { x: nx*vw*sc+ox, y: ny*vh*sc+oy };
      });
    }

    function triangleArea(a,b,c) {
      return 0.5*Math.abs((b.x-a.x)*(c.y-a.y)-(c.x-a.x)*(b.y-a.y));
    }

    // ── Draw mesh ────────────────────────────────────
    function drawMesh(points) {
      if (!Delaunay || !points || points.length < 3) return;
      lastPointsForPhysics = points;
      const camColor = (mode === 'face');
      if (camColor && !ensureSampleCanvas()) return;
      const pts = points.map(p => [p.x, p.y]);
      const del = Delaunay.from(pts);
      const tri = del.triangles;
      const areas = [];
      let minA = Infinity, maxA = -Infinity;
      for (let i = 0; i < tri.length; i += 3) {
        const area = triangleArea(points[tri[i]], points[tri[i+1]], points[tri[i+2]]);
        areas.push(area);
        if (area < minA) minA = area;
        if (area > maxA) maxA = area;
      }
      const range = maxA - minA || 1;
      ctx.save(); ctx.setTransform(1,0,0,1,0,0);
      for (let i = 0; i < tri.length; i += 3) {
        const a = points[tri[i]], b = points[tri[i+1]], c = points[tri[i+2]];
        let fill;
        if (camColor) {
          fill = sampleVideoAtCanvasPoint((a.x+b.x+c.x)/3, (a.y+b.y+c.y)/3) || 'rgb(128,128,128)';
        } else {
          const g = Math.round(45 + ((areas[i/3]-minA)/range)*195);
          fill = 'rgb('+g+','+g+','+g+')';
        }
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.closePath();
        ctx.fillStyle = fill; ctx.fill();
        if (showLines) { ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 0.5; ctx.stroke(); }
      }
      ctx.restore();
    }

    function drawFaceDots(points) {
      points.forEach(p => {
        ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(99,102,241,0.9)'; ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 0.5; ctx.stroke();
      });
    }

    // ── Physics ──────────────────────────────────────
    function createPhysicsBodiesFromMesh() {
      if (!Delaunay || !lastPointsForPhysics || lastPointsForPhysics.length < 3) return;
      if (!Matter || !Engine) return;
      if (!matterEngine) { matterEngine = Engine.create(); matterWorld = matterEngine.world; }
      World.clear(matterWorld);
      matterEngine.gravity.x = 0; matterEngine.gravity.y = 1; matterEngine.gravity.scale = 0.0012;

      const W = canvas.width, H = canvas.height;
      const groundY = H;
      const now = Date.now();

      World.add(matterWorld, [
        Bodies.rectangle(W/2, groundY + 30, W + 200, 60, {isStatic:true, restitution:0.55, friction:0.3}),
        Bodies.rectangle(-30, H/2, 60, H + 200, {isStatic:true}),
        Bodies.rectangle(W+30, H/2, 60, H + 200, {isStatic:true})
      ]);

      const camColor = (mode === 'face');
      if (camColor) ensureSampleCanvas();
      const pts = lastPointsForPhysics.map(p=>[p.x,p.y]);
      const del = Delaunay.from(pts), tri = del.triangles;

      for (let i = 0; i < tri.length; i += 3) {
        const a = lastPointsForPhysics[tri[i]], b = lastPointsForPhysics[tri[i+1]], c = lastPointsForPhysics[tri[i+2]];
        const cx = (a.x+b.x+c.x)/3, cy = (a.y+b.y+c.y)/3;
        const verts = [{x:a.x-cx,y:a.y-cy},{x:b.x-cx,y:b.y-cy},{x:c.x-cx,y:c.y-cy}];
        let body = Bodies.fromVertices(cx, cy, verts, {
          friction:0.2, restitution:0.5+Math.random()*0.25,
          density:0.002, frictionAir:0.008+Math.random()*0.016, slop:0.01
        });
        if (!body) {
          const r = (Math.hypot(a.x-cx,a.y-cy)+Math.hypot(b.x-cx,b.y-cy)+Math.hypot(c.x-cx,c.y-cy))/3;
          body = Bodies.polygon(cx,cy,3,Math.max(8,r),{friction:0.2,restitution:0.5,density:0.002,frictionAir:0.01});
        }
        if (!body) continue;
        Body.setVelocity(body, {x:(Math.random()-0.5)*3, y:0});
        body.birthTime = now; body.alpha = 1.0;
        if (camColor && sampleCtx) {
          body.fillStyle = sampleVideoAtCanvasPoint(cx,cy) || 'rgb(128,128,128)';
        } else {
          const t = Math.min(1, triangleArea(a,b,c)/5000);
          const g = Math.round(45+t*195);
          body.fillStyle = 'rgb('+g+','+g+','+g+')';
        }
        World.add(matterWorld, body);
      }

      physicsActive = true;
      const FD = 2200, FF = 1600;

      function loop() {
        if (!physicsActive || !matterEngine) return;
        requestAnimationFrame(loop);
        Engine.update(matterEngine, 1000/60);
        const t2 = Date.now(), all = matterWorld.bodies, rm = [];
        ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,W,H);
        for (let i = 0; i < all.length; i++) {
          const b = all[i];
          if (b.isStatic) continue;
          const age = t2 - b.birthTime;
          if (age > FD) b.alpha = 1-(age-FD)/FF;
          if (b.alpha <= 0) { rm.push(b); continue; }
          const v = b.vertices;
          if (!v || !v.length) continue;
          ctx.globalAlpha = Math.max(0,Math.min(1,b.alpha));
          ctx.beginPath(); ctx.moveTo(v[0].x,v[0].y);
          for (let j=1;j<v.length;j++) ctx.lineTo(v[j].x,v[j].y);
          ctx.closePath();
          ctx.fillStyle = b.fillStyle||'rgb(128,128,128)'; ctx.fill();
          if (showLines) { ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=0.5; ctx.stroke(); }
        }
        ctx.globalAlpha = 1; ctx.restore();
        rm.forEach(b => World.remove(matterWorld, b));
        if (all.filter(b=>!b.isStatic).length === 0) physicsActive = false;
      }
      loop();
    }

    // ── Main draw ────────────────────────────────────
    function drawFrame(faceLandmarks) {
      if (physicsActive) return;
      if (!faceLandmarks || !faceLandmarks.length) return;
      resizeCanvas();
      const points = keypointsToCanvas(faceLandmarks[0]);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawMesh(points);
      if (mode === 'face') drawFaceDots(points);
    }

    // ── Face loop ────────────────────────────────────
    function detectFaceLoop() {
      if (!stream || !video.videoWidth || !faceLandmarker) return;
      const t = video.currentTime;
      if (t === lastVideoTime) { if (stream) detectInterval = setTimeout(detectFaceLoop, 50); return; }
      lastVideoTime = t;
      try {
        const r = faceLandmarker.detectForVideo(video, t*1000);
        drawFrame(r.faceLandmarks?.length ? r.faceLandmarks : null);
      } catch(e) {}
      if (stream) detectInterval = setTimeout(detectFaceLoop, 50);
    }

    // ── Start camera ─────────────────────────────────
    async function startCamera() {
      try {
        if (video.srcObject?.getTracks?.().length > 0) {
          stream = video.srcObject;
        } else {
          stream = await navigator.mediaDevices.getUserMedia({
            video: {width:{ideal:1280},height:{ideal:720},facingMode:'user'}, audio:false
          });
          video.srcObject = stream;
        }
        video.classList.add('active');
        video.classList.toggle('hidden', !showCamera);
        canvas.classList.add('active');
        resizeCanvas();
        await video.play().catch(()=>{});
        if (!faceLandmarker) {
          await loadDeps();
          if (FilesetResolver && FaceLandmarker) {
            const vis = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm');
            faceLandmarker = await FaceLandmarker.createFromOptions(vis, {
              baseOptions: {modelAssetPath:'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task'},
              runningMode:'VIDEO', numFaces:1
            });
          }
        }
        lastVideoTime = -1;
        video.onloadedmetadata = () => detectFaceLoop();
        if (video.readyState >= 2) detectFaceLoop();
        return true;
      } catch(err) {
        stream = null;
        let msg = err.message || 'Unknown error';
        if (err.name === 'NotAllowedError') msg = 'Camera permission denied. Allow access and try again.';
        if (err.name === 'NotFoundError') msg = 'No camera found.';
        if (err.name === 'NotReadableError') msg = 'Camera in use by another app.';
        errorText.textContent = msg;
        errorOverlay.classList.add('visible');
        throw err;
      }
    }

    retryBtn.addEventListener('click', () => {
      errorOverlay.classList.remove('visible');
      tapOverlay.classList.add('visible');
      document.addEventListener('click', launchFromTap, {once:true});
    });

    window.addEventListener('beforeunload', () => { if (stream) stream.getTracks().forEach(t=>t.stop()); });

    async function launchFromTap() {
      tapOverlay.style.transition = 'opacity 0.35s';
      tapOverlay.style.opacity = '0';
      setTimeout(() => { tapOverlay.classList.remove('visible'); tapOverlay.style.opacity = ''; }, 350);
      await startCamera().catch(()=>{});
    }

    (async function init() {
      try {
        await startCamera();
        tapOverlay.classList.remove('visible');
      } catch(e) {
        tapOverlay.classList.add('visible');
        document.addEventListener('click', launchFromTap, {once:true});
      }
    })();
  </script>
</body>
</html>
