<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Camera Feed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    :root {
      --bg: #0f0f12;
      --surface: #1a1a1f;
      --border: #2a2a32;
      --text: #e8e8ed;
      --text-muted: #8888a0;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --error: #f87171;
      --success: #34d399;
    }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    main {
      width: 100%;
      max-width: 900px;
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .version-num {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 400;
    }
    h1::before {
      content: '';
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .feed-wrap {
      position: relative;
      aspect-ratio: 16 / 10;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #video,
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #video {
      display: none;
    }
    #video.active {
      display: block;
    }
    #video.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #canvas {
      pointer-events: none;
      display: none;
    }
    #canvas.active {
      display: block;
    }
    .placeholder {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
    }
    .placeholder p {
      margin-bottom: 1rem;
    }
    .placeholder .icon {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      opacity: 0.6;
    }
    .error-msg {
      color: var(--error);
      margin-top: 0.5rem;
    }
    .controls {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    button {
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button:active {
      transform: scale(0.98);
    }
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover {
      background: var(--accent-hover);
    }
    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }
    .btn-secondary:hover {
      background: #3a3a45;
    }
    .btn-primary:disabled,
    .btn-secondary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .status {
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.35rem;
      margin-left: auto;
    }
    .status.on {
      color: var(--success);
    }
    .status.on::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    .control-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .file-label {
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .file-label span { margin-right: 0.25rem; }
    .feedback {
      position: absolute;
      top: 0.5rem;
      left: 0.5rem;
      right: 0.5rem;
      z-index: 5;
      display: none;
      flex-wrap: wrap;
      gap: 0.5rem;
      pointer-events: none;
    }
    .feedback.visible { display: flex; }
    .feedback-item {
      background: rgba(0, 0, 0, 0.7);
      color: var(--text);
      font-size: 0.75rem;
      padding: 0.35rem 0.6rem;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .feedback-item.ok { border-color: var(--success); color: var(--success); }
    .feedback-item.warn { border-color: #fbbf24; color: #fbbf24; }
    .debug-panel {
      margin-top: 0.5rem;
      padding: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: ui-monospace, monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 12rem;
      overflow: auto;
      display: none;
    }
    .debug-panel.visible { display: block; }
    .error-banner {
      display: none;
      padding: 0.6rem 1rem;
      background: rgba(248, 113, 113, 0.2);
      border: 1px solid var(--error);
      color: var(--error);
      font-size: 0.85rem;
      border-radius: 8px;
      margin-top: 0.5rem;
    }
    .error-banner.visible { display: block; }
    .action-log-wrap {
      padding: 0 1.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      background: rgba(99, 102, 241, 0.08);
    }
    .action-log-wrap .label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .action-log {
      min-height: 7rem;
      padding: 0.5rem;
      max-height: 10rem;
      overflow-y: auto;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: ui-monospace, monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-all;
    }
    .action-log .line { margin: 0.15rem 0; }
    .action-log .ts { color: #666; margin-right: 0.35rem; }
  </style>
</head>
<body>
  <main>
    <div class="header-row">
      <h1>Live Camera Feed</h1>
      <span class="version-num" aria-label="Version">v1.2.2</span>
    </div>
    <div class="action-log-wrap">
      <div class="label">Debug log — actions as they happen</div>
      <div id="actionLog" class="action-log" aria-live="polite"></div>
    </div>
    <div class="feed-wrap">
      <div id="feedback" class="feedback" aria-live="polite">
        <span id="feedbackCamera" class="feedback-item">Camera: —</span>
        <span id="feedbackFace" class="feedback-item">Face: —</span>
        <span id="feedbackMask" class="feedback-item">Mask: —</span>
      </div>
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div id="placeholder" class="placeholder">
        <div class="icon">📷</div>
        <p>Camera is off</p>
        <p>Click <strong>Start camera</strong> to show the live feed</p>
      </div>
    </div>
    <div class="controls">
      <button id="startBtn" class="btn-primary">Start camera</button>
      <button id="stopBtn" class="btn-secondary" disabled>Stop camera</button>
      <label class="control-label">
        <input type="checkbox" id="faceDots" checked> Face dots
      </label>
      <label class="control-label">
        <input type="checkbox" id="showMask"> Mask
      </label>
      <label class="control-label file-label">
        <span>Mask image</span>
        <input type="file" id="maskFile" accept="image/*" hidden>
        <button type="button" id="maskFileBtn" class="btn-secondary">Choose image…</button>
      </label>
      <label class="control-label">
        <input type="checkbox" id="colorTestCheck"> Color test
      </label>
      <label class="control-label">
        <input type="checkbox" id="colorFromCameraCheck"> Color from camera
      </label>
      <label class="control-label">
        <input type="checkbox" id="triangleStrokeCheck" checked> Triangle stroke
      </label>
      <label class="control-label">
        <input type="checkbox" id="showCameraCheck" checked> Show camera
      </label>
      <button type="button" id="dropMeshBtn" class="btn-secondary">Drop mesh</button>
      <button type="button" id="resetPhysicsBtn" class="btn-secondary">Reset</button>
      <label class="control-label">
        <input type="checkbox" id="debugCheck"> Debug
      </label>
      <span id="status" class="status">Off</span>
    </div>
    <div id="errorBanner" class="error-banner" aria-live="assertive"></div>
    <div id="debugPanel" class="debug-panel" aria-live="polite"></div>
  </main>
  <script>
  (function(){
    var el = document.getElementById('actionLog');
    if (!el) {
      el = document.createElement('div');
      el.id = 'actionLog';
      el.className = 'action-log';
      el.style.cssText = 'min-height:7rem;padding:0.5rem;background:#0f0f12;border:1px solid #2a2a32;border-radius:8px;font-family:monospace;font-size:0.7rem;color:#888;margin:0.5rem 1.5rem;';
      var wrap = document.querySelector('.action-log-wrap') || document.querySelector('main');
      if (wrap) wrap.appendChild(el);
      else document.body.insertBefore(el, document.body.firstChild);
    }
    function add(msg) {
      if (!el) return;
      var line = document.createElement('div');
      line.className = 'line';
      var ts = new Date().toISOString().slice(11, 23);
      line.innerHTML = '<span class="ts">' + ts + '</span> ' + String(msg).replace(/</g, '&lt;');
      el.appendChild(line);
      el.scrollTop = el.scrollHeight;
    }
    add('Page loaded. Debug log ready.');
    var btn = document.getElementById('startBtn');
    if (btn) {
      btn.addEventListener('click', function() {
        add('[INLINE] Start camera clicked');
        if (!navigator.mediaDevices) {
          add('ERROR: No mediaDevices');
          return;
        }
        add('getUserMedia…');
        navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        }).then(function(s) {
          add('getUserMedia OK');
          var v = document.getElementById('video');
          var pl = document.getElementById('placeholder');
          if (!v) return;
          v.srcObject = s;
          v.classList.add('active');
          if (pl) pl.style.display = 'none';
          document.getElementById('canvas').classList.add('active');
          add('video.play()…');
          return v.play();
        }).then(function() {
          add('Camera on (app may add face/mesh when loaded)');
        }).catch(function(err) {
          add('FAILED: ' + (err.name || '') + ' ' + (err.message || ''));
        });
      });
      add('Inline Start listener attached.');
    } else {
      add('ERROR: Start button not found.');
    }
  })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js" crossorigin="anonymous"></script>
  <script type="module">
    let FaceLandmarker = null;
    let FilesetResolver = null;
    let Delaunay = null;

    const Matter = globalThis.Matter;
    const Engine = Matter?.Engine;
    const World = Matter?.World;
    const Bodies = Matter?.Bodies;
    const Body = Matter?.Body;

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const placeholder = document.getElementById('placeholder');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusEl = document.getElementById('status');
    const faceDotsCheck = document.getElementById('faceDots');
    const showMaskCheck = document.getElementById('showMask');
    const maskFileInput = document.getElementById('maskFile');
    const maskFileBtn = document.getElementById('maskFileBtn');
    const feedbackEl = document.getElementById('feedback');
    const feedbackCamera = document.getElementById('feedbackCamera');
    const feedbackFace = document.getElementById('feedbackFace');
    const feedbackMask = document.getElementById('feedbackMask');
    const colorTestCheck = document.getElementById('colorTestCheck');
    const colorFromCameraCheck = document.getElementById('colorFromCameraCheck');
    const triangleStrokeCheck = document.getElementById('triangleStrokeCheck');
    const showCameraCheck = document.getElementById('showCameraCheck');
    const dropMeshBtn = document.getElementById('dropMeshBtn');
    const resetPhysicsBtn = document.getElementById('resetPhysicsBtn');
    const debugCheck = document.getElementById('debugCheck');
    const debugPanel = document.getElementById('debugPanel');
    const errorBanner = document.getElementById('errorBanner');
    const actionLogEl = document.getElementById('actionLog');
    let stream = null;

    function logAction(msg) {
      const ts = new Date().toISOString().slice(11, 23);
      const line = document.createElement('div');
      line.className = 'line';
      line.innerHTML = '<span class="ts">' + ts + '</span>' + String(msg).replace(/</g, '&lt;');
      if (actionLogEl) {
        actionLogEl.appendChild(line);
        actionLogEl.scrollTop = actionLogEl.scrollHeight;
      }
      try { console.log('[Action]', msg); } catch (e) {}
    }
    logAction('Script running, startBtn=' + (startBtn ? 'ok' : 'NULL'));

    async function loadDeps() {
      if (FaceLandmarker && Delaunay) return true;
      try {
        logAction('Loading MediaPipe…');
        const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs');
        FaceLandmarker = vision.FaceLandmarker;
        FilesetResolver = vision.FilesetResolver;
        logAction('MediaPipe loaded');
      } catch (e) {
        logAction('MediaPipe load failed: ' + (e && e.message ? e.message : String(e)));
      }
      try {
        logAction('Loading Delaunay…');
        const d3 = await import('https://cdn.skypack.dev/d3-delaunay@6');
        Delaunay = d3.Delaunay;
        logAction('Delaunay loaded');
      } catch (e) {
        logAction('Delaunay load failed: ' + (e && e.message ? e.message : String(e)));
      }
      return !!(FaceLandmarker && Delaunay);
    }

    let lastPointsForPhysics = null;
    let lastMeshColors = null;
    let matterEngine = null;
    let matterWorld = null;
    let physicsActive = false;
    let debugInfo = {};
    let faceLandmarker = null;
    let detectInterval = null;
    let lastVideoTime = -1;
    let maskImage = null;
    let sampleCanvas = null;
    let sampleCtx = null;
    let lastError = null;

    function ensureSampleCanvas() {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      if (!vw || !vh) return false;
      if (!sampleCanvas || sampleCanvas.width !== vw || sampleCanvas.height !== vh) {
        sampleCanvas = document.createElement('canvas');
        sampleCanvas.width = vw;
        sampleCanvas.height = vh;
        sampleCtx = sampleCanvas.getContext('2d');
      }
      sampleCtx.drawImage(video, 0, 0, vw, vh);
      return true;
    }

    function sampleVideoAtCanvasPoint(cx, cy) {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      if (!sampleCanvas || !sampleCtx || !vw || !vh) return null;
      const scale = Math.max(canvas.width / vw, canvas.height / vh);
      const offsetX = (canvas.width - vw * scale) / 2;
      const offsetY = (canvas.height - vh * scale) / 2;
      const vx = (cx - offsetX) / scale;
      const vy = (cy - offsetY) / scale;
      const x = Math.floor(Math.max(0, Math.min(vw - 1, vx)));
      const y = Math.floor(Math.max(0, Math.min(vh - 1, vy)));
      const data = sampleCtx.getImageData(x, y, 1, 1).data;
      return 'rgb(' + data[0] + ',' + data[1] + ',' + data[2] + ')';
    }

    function setError(msg) {
      lastError = msg;
      if (errorBanner) {
        errorBanner.textContent = msg;
        errorBanner.classList.add('visible');
      }
      placeholder.innerHTML = `
        <div class="icon">⚠️</div>
        <p>Could not access camera</p>
        <p class="error-msg">${msg}</p>
        <p style="margin-top:0.75rem;font-size:0.9rem">Check permissions and try again.</p>
      `;
      placeholder.style.display = 'block';
      try { console.error('[Camera]', msg); } catch (e) {}
      updateDebugPanel();
    }

    function clearError() {
      lastError = null;
      if (errorBanner) errorBanner.classList.remove('visible');
      placeholder.innerHTML = `
        <div class="icon">📷</div>
        <p>Camera is off</p>
        <p>Click <strong>Start camera</strong> to show the live feed</p>
      `;
    }

    function resizeCanvas() {
      const wrap = canvas.parentElement;
      const w = wrap.offsetWidth;
      const h = wrap.offsetHeight;
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
      }
    }

    function keypointsToCanvas(keypoints) {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      if (!vw || !vh) return keypoints.map((kp) => ({ x: kp.x * canvas.width, y: kp.y * canvas.height }));
      const scale = Math.max(canvas.width / vw, canvas.height / vh);
      const offsetX = (canvas.width - vw * scale) / 2;
      const offsetY = (canvas.height - vh * scale) / 2;
      return keypoints.map((kp) => {
        const nx = kp.x > 1 ? kp.x / vw : kp.x;
        const ny = kp.y > 1 ? kp.y / vh : kp.y;
        return {
          x: nx * vw * scale + offsetX,
          y: ny * vh * scale + offsetY
        };
      });
    }

    function getFaceQuad(points) {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      points.forEach((p) => {
        minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
        minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
      });
      const padX = (maxX - minX) * 0.05;
      const padY = (maxY - minY) * 0.05;
      return [
        { x: minX - padX, y: minY - padY },
        { x: maxX + padX, y: minY - padY },
        { x: maxX + padX, y: maxY + padY },
        { x: minX - padX, y: maxY + padY }
      ];
    }

    function solveAffine(src, dst) {
      const [p1, p2, p3] = src;
      const [q1, q2, q3] = dst;
      const det = p1.x * (p2.y - p3.y) - p1.y * (p2.x - p3.x) + p2.x * p3.y - p3.x * p2.y;
      if (Math.abs(det) < 1e-10) return null;
      const a = (q1.x * (p2.y - p3.y) + q2.x * (p3.y - p1.y) + q3.x * (p1.y - p2.y)) / det;
      const c = (q1.y * (p2.y - p3.y) + q2.y * (p3.y - p1.y) + q3.y * (p1.y - p2.y)) / det;
      const e = (q1.x * (p2.x * p3.y - p3.x * p2.y) + q2.x * (p3.x * p1.y - p1.x * p3.y) + q3.x * (p1.x * p2.y - p2.x * p1.y)) / det;
      const b = (q1.x * (p2.x - p3.x) + q2.x * (p3.x - p1.x) + q3.x * (p1.x - p2.x)) / det;
      const d = (q1.y * (p2.x - p3.x) + q2.y * (p3.x - p1.x) + q3.y * (p1.x - p2.x)) / det;
      const f = (q1.y * (p2.x * p3.y - p3.x * p2.y) + q2.y * (p3.x * p1.y - p1.x * p3.y) + q3.y * (p1.x * p2.y - p2.x * p1.y)) / det;
      return { a, b, c, d, e, f };
    }

    function drawImageWarpedToQuad(img, quad) {
      const w = img.width;
      const h = img.height;
      const minX = Math.min(quad[0].x, quad[1].x, quad[2].x, quad[3].x);
      const maxX = Math.max(quad[0].x, quad[1].x, quad[2].x, quad[3].x);
      const minY = Math.min(quad[0].y, quad[1].y, quad[2].y, quad[3].y);
      const maxY = Math.max(quad[0].y, quad[1].y, quad[2].y, quad[3].y);
      const area = (maxX - minX) * (maxY - minY);
      debugInfo.maskQuad = { minX, minY, maxX, maxY, area };
      if (area < 100) {
        debugInfo.maskDraw = 'skip (area < 100)';
        return;
      }
      const srcTri1 = [{ x: 0, y: 0 }, { x: w, y: 0 }, { x: w, y: h }];
      const dstTri1 = [quad[0], quad[1], quad[2]];
      const srcTri2 = [{ x: 0, y: 0 }, { x: w, y: h }, { x: 0, y: h }];
      const dstTri2 = [quad[0], quad[2], quad[3]];
      const t1 = solveAffine(srcTri1, dstTri1);
      const t2 = solveAffine(srcTri2, dstTri2);
      if (!t1 || !t2) {
        debugInfo.maskDraw = 'bbox fallback (affine failed)';
        ctx.drawImage(img, minX, minY, maxX - minX, maxY - minY);
        return;
      }
      debugInfo.maskDraw = 'warp';
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(quad[0].x, quad[0].y);
      ctx.lineTo(quad[1].x, quad[1].y);
      ctx.lineTo(quad[2].x, quad[2].y);
      ctx.lineTo(quad[3].x, quad[3].y);
      ctx.closePath();
      ctx.clip();
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(quad[0].x, quad[0].y);
      ctx.lineTo(quad[1].x, quad[1].y);
      ctx.lineTo(quad[2].x, quad[2].y);
      ctx.closePath();
      ctx.clip();
      ctx.setTransform(t1.a, t1.b, t1.c, t1.d, t1.e, t1.f);
      ctx.drawImage(img, 0, 0, w, h);
      ctx.restore();
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(quad[0].x, quad[0].y);
      ctx.lineTo(quad[2].x, quad[2].y);
      ctx.lineTo(quad[3].x, quad[3].y);
      ctx.closePath();
      ctx.clip();
      ctx.setTransform(t2.a, t2.b, t2.c, t2.d, t2.e, t2.f);
      ctx.drawImage(img, 0, 0, w, h);
      ctx.restore();
      ctx.restore();
    }

    function triangleArea(a, b, c) {
      return 0.5 * Math.abs((b.x - a.x) * (c.y - a.y) - (c.x - a.x) * (b.y - a.y));
    }

    function drawColorTestMesh(points) {
      if (!Delaunay || !points || points.length < 3) return 0;
      lastPointsForPhysics = points;
      lastMeshColors = [];
      const useCameraColor = colorFromCameraCheck.checked;
      if (useCameraColor && !ensureSampleCanvas()) useCameraColor = false;
      const pts = points.map((p) => [p.x, p.y]);
      const delaunay = Delaunay.from(pts);
      const triangles = delaunay.triangles;
      let minArea = Infinity;
      let maxArea = -Infinity;
      const areas = [];
      for (let i = 0; i < triangles.length; i += 3) {
        const a = points[triangles[i]];
        const b = points[triangles[i + 1]];
        const c = points[triangles[i + 2]];
        const area = triangleArea(a, b, c);
        areas.push(area);
        if (area < minArea) minArea = area;
        if (area > maxArea) maxArea = area;
      }
      const range = maxArea - minArea || 1;
      const dark = 45;
      const light = 240;
      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      for (let i = 0; i < triangles.length; i += 3) {
        const ia = triangles[i];
        const ib = triangles[i + 1];
        const ic = triangles[i + 2];
        const a = points[ia];
        const b = points[ib];
        const c = points[ic];
        let fillStyle;
        if (useCameraColor) {
          const cx = (a.x + b.x + c.x) / 3;
          const cy = (a.y + b.y + c.y) / 3;
          fillStyle = sampleVideoAtCanvasPoint(cx, cy);
          if (!fillStyle) fillStyle = 'rgb(128,128,128)';
        } else {
          const area = areas[i / 3];
          const t = (area - minArea) / range;
          const g = Math.round(dark + t * (light - dark));
          fillStyle = 'rgb(' + g + ',' + g + ',' + g + ')';
        }
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.lineTo(c.x, c.y);
        ctx.closePath();
        ctx.fillStyle = fillStyle;
        ctx.fill();
        if (triangleStrokeCheck.checked) {
          ctx.strokeStyle = 'rgba(0,0,0,0.4)';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
        if (!lastMeshColors) lastMeshColors = [];
        lastMeshColors.push(fillStyle);
      }
      ctx.restore();
      return triangles.length / 3;
    }

    function createPhysicsBodiesFromMesh() {
      if (!Delaunay || !lastPointsForPhysics || lastPointsForPhysics.length < 3) return;
      if (!Matter || !Matter.Engine) return;
      if (!matterEngine) {
        matterEngine = Engine.create();
        matterWorld = matterEngine.world;
      }
      World.clear(matterWorld);
      matterEngine.gravity.x = 0;
      matterEngine.gravity.y = 1;
      matterEngine.gravity.scale = 0.0012;

      lastMeshColors = null;
      const W = canvas.width;
      const H = canvas.height;
      const now = Date.now();

      // Ground and side walls (static, invisible)
      const ground = Bodies.rectangle(W / 2, H + 30, W + 200, 60, { isStatic: true, label: 'ground', restitution: 0.55, friction: 0.3 });
      const wallL  = Bodies.rectangle(-30, H / 2, 60, H + 200, { isStatic: true, label: 'wall' });
      const wallR  = Bodies.rectangle(W + 30, H / 2, 60, H + 200, { isStatic: true, label: 'wall' });
      World.add(matterWorld, [ground, wallL, wallR]);

      const pts = lastPointsForPhysics.map((p) => [p.x, p.y]);
      const delaunay = Delaunay.from(pts);
      const triangles = delaunay.triangles;
      const points = lastPointsForPhysics;
      const useCameraColor = colorFromCameraCheck.checked;
      if (useCameraColor) ensureSampleCanvas();

      for (let i = 0; i < triangles.length; i += 3) {
        const a = points[triangles[i]];
        const b = points[triangles[i + 1]];
        const c = points[triangles[i + 2]];
        const cx = (a.x + b.x + c.x) / 3;
        const cy = (a.y + b.y + c.y) / 3;
        const verts = [
          { x: a.x - cx, y: a.y - cy },
          { x: b.x - cx, y: b.y - cy },
          { x: c.x - cx, y: c.y - cy }
        ];
        let body = Bodies.fromVertices(cx, cy, verts, {
          friction: 0.2,
          restitution: 0.5 + Math.random() * 0.25,
          density: 0.002,
          frictionAir: 0.008 + Math.random() * 0.016,
          slop: 0.01
        });
        if (!body) {
          const r = (Math.hypot(a.x - cx, a.y - cy) + Math.hypot(b.x - cx, b.y - cy) + Math.hypot(c.x - cx, c.y - cy)) / 3;
          body = Bodies.polygon(cx, cy, 3, Math.max(8, r), {
            friction: 0.2, restitution: 0.5, density: 0.002, frictionAir: 0.01
          });
        }
        if (!body) continue;
        // small random sideways nudge so pieces spread out
        Body.setVelocity(body, { x: (Math.random() - 0.5) * 3, y: 0 });
        body.birthTime = now;
        body.alpha = 1.0;
        if (useCameraColor && sampleCtx) {
          body.fillStyle = sampleVideoAtCanvasPoint(cx, cy) || 'rgb(128,128,128)';
        } else {
          const area = triangleArea(a, b, c);
          const t = Math.min(1, Math.max(0, (area - 0) / (5000 - 0)));
          const g = Math.round(45 + t * 195);
          body.fillStyle = 'rgb(' + g + ',' + g + ',' + g + ')';
        }
        World.add(matterWorld, body);
      }

      physicsActive = true;
      const FADE_DELAY = 1800;    // ms before pieces start fading
      const FADE_DURATION = 1400; // ms to fully disappear

      function physicsLoop() {
        if (!physicsActive || !matterEngine) return;
        requestAnimationFrame(physicsLoop);
        Engine.update(matterEngine, 1000 / 60);

        const now2 = Date.now();
        const allBodies = matterWorld.bodies;
        const toRemove = [];

        ctx.save();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, W, H);

        for (let i = 0; i < allBodies.length; i++) {
          const body = allBodies[i];
          if (body.isStatic) continue;
          const age = now2 - body.birthTime;
          if (age > FADE_DELAY) {
            body.alpha = 1.0 - (age - FADE_DELAY) / FADE_DURATION;
          }
          if (body.alpha <= 0) { toRemove.push(body); continue; }
          const verts = body.vertices;
          if (!verts || !verts.length) continue;
          ctx.globalAlpha = Math.max(0, Math.min(1, body.alpha));
          ctx.beginPath();
          ctx.moveTo(verts[0].x, verts[0].y);
          for (let j = 1; j < verts.length; j++) ctx.lineTo(verts[j].x, verts[j].y);
          ctx.closePath();
          ctx.fillStyle = body.fillStyle || 'rgb(128,128,128)';
          ctx.fill();
          if (triangleStrokeCheck.checked) {
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
        ctx.globalAlpha = 1.0;
        ctx.restore();

        for (let i = 0; i < toRemove.length; i++) World.remove(matterWorld, toRemove[i]);
        if (allBodies.filter(b => !b.isStatic).length === 0) physicsActive = false;
      }
      physicsLoop();
    }

    function drawDebugQuad(quad) {
      if (!quad || !debugCheck.checked) return;
      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.strokeStyle = 'lime';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(quad[0].x, quad[0].y);
      for (let i = 1; i < quad.length; i++) ctx.lineTo(quad[i].x, quad[i].y);
      ctx.closePath();
      ctx.stroke();
      ctx.restore();
    }

    function updateDebugPanel() {
      if (!debugPanel) return;
      debugPanel.classList.toggle('visible', debugCheck.checked);
      if (!debugCheck.checked) return;
      const lines = [
        'mediaDevices: ' + (navigator.mediaDevices && navigator.mediaDevices.getUserMedia ? 'yes' : 'NO'),
        'Matter.js: ' + (Matter && Matter.Engine ? 'loaded' : 'not loaded'),
        'stream: ' + (stream ? 'active' : 'null'),
        'lastError: ' + (lastError || '—'),
        'video: ' + (video.videoWidth || 0) + '×' + (video.videoHeight || 0),
        'canvas: ' + canvas.width + '×' + canvas.height,
        'mask image: ' + (maskImage ? maskImage.width + '×' + maskImage.height + ' (loaded)' : 'none'),
        'mask draw: ' + (debugInfo.maskDraw || '—'),
      ];
      if (debugInfo.maskQuad) {
        const q = debugInfo.maskQuad;
        if (q.triCount != null) lines.push('mesh: ' + q.triCount + ' triangles');
        else lines.push('quad: min(' + (q.minX | 0) + ',' + (q.minY | 0) + ') max(' + (q.maxX | 0) + ',' + (q.maxY | 0) + ') area=' + (q.area | 0));
      }
      debugPanel.textContent = lines.join('\n');
    }

    function updateFeedback(faceCount) {
      if (!feedbackEl) return;
      feedbackCamera.textContent = stream ? 'Camera: Live' : 'Camera: Off';
      feedbackCamera.className = 'feedback-item ' + (stream ? 'ok' : '');
      if (stream) {
        feedbackFace.textContent = faceCount > 0 ? `Face: Detected (${faceCount} face${faceCount !== 1 ? 's' : ''})` : 'Face: Searching…';
        feedbackFace.className = 'feedback-item ' + (faceCount > 0 ? 'ok' : 'warn');
        const maskState = !maskImage ? 'No image' : (showMaskCheck.checked ? 'On' : 'Off');
        feedbackMask.textContent = 'Mask: ' + maskState;
        feedbackMask.className = 'feedback-item ' + (showMaskCheck.checked && maskImage ? 'ok' : '');
      } else {
        feedbackFace.textContent = 'Face: —';
        feedbackFace.className = 'feedback-item';
        feedbackMask.textContent = 'Mask: —';
        feedbackMask.className = 'feedback-item';
      }
      feedbackEl.classList.toggle('visible', !!stream);
    }

    function drawFaceDots(faceLandmarks) {
      const faceCount = faceLandmarks?.length ?? 0;
      updateFeedback(faceCount);
      if (physicsActive) return;
      if (!faceLandmarks || !faceLandmarks.length) {
        debugInfo.maskQuad = null;
        debugInfo.maskDraw = maskImage ? (showMaskCheck.checked ? 'no face' : 'mask off') : 'no image';
        updateDebugPanel();
        return;
      }
      resizeCanvas();
      const keypoints = faceLandmarks[0];
      const points = keypointsToCanvas(keypoints);
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const quad = getFaceQuad(points);
      if (colorTestCheck.checked) {
        const triCount = drawColorTestMesh(points);
        debugInfo.maskQuad = { triCount };
        debugInfo.maskDraw = 'color test mesh (' + triCount + ' tris)';
      } else if (maskImage && showMaskCheck.checked) {
        drawImageWarpedToQuad(maskImage, quad);
        if (debugCheck.checked) drawDebugQuad(quad);
      } else {
        debugInfo.maskQuad = null;
        debugInfo.maskDraw = maskImage && showMaskCheck.checked ? '—' : (maskImage ? 'mask off' : 'no image');
      }
      if (debugCheck.checked && !colorTestCheck.checked) drawDebugQuad(quad);

      updateDebugPanel();

      if (faceDotsCheck.checked) {
        points.forEach((p) => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(99, 102, 241, 0.9)';
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.4)';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        });
      }
    }

    async function detectFaceLoop() {
      if (!stream) { logAction('detectFaceLoop: no stream'); return; }
      if (!video.videoWidth) { logAction('detectFaceLoop: no videoWidth yet'); if (stream) detectInterval = setTimeout(detectFaceLoop, 200); return; }
      if (!faceLandmarker) { logAction('detectFaceLoop: no faceLandmarker'); return; }
      const currentTime = video.currentTime;
      if (currentTime === lastVideoTime) {
        if (stream) detectInterval = setTimeout(detectFaceLoop, 50);
        return;
      }
      lastVideoTime = currentTime;
      try {
        const result = faceLandmarker.detectForVideo(video, currentTime * 1000);
        const faces = result.faceLandmarks ?? [];
        if (faces.length === 0 && Math.random() < 0.02) logAction('Face loop running — no face detected');
        drawFaceDots(faces.length ? result.faceLandmarks : []);
      } catch (e) {
        logAction('detectForVideo error: ' + (e && e.message ? e.message : String(e)));
        updateFeedback(0);
      }
      if (stream) detectInterval = setTimeout(detectFaceLoop, 50);
    }

    async function startCamera() {
      logAction('Start camera clicked');
      clearError();
      startBtn.disabled = true;
      try {
        if (video.srcObject && video.srcObject.getTracks && video.srcObject.getTracks().length > 0) {
          logAction('Reusing existing stream from video');
          stream = video.srcObject;
        } else {
          placeholder.innerHTML = '<div class="icon">⏳</div><p>Requesting camera…</p><p>Allow access if the browser asks.</p>';
          placeholder.style.display = 'block';
          logAction('Calling getUserMedia…');
          stream = await navigator.mediaDevices.getUserMedia({
            video: { width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
          });
          logAction('getUserMedia OK, got stream');
          video.srcObject = stream;
        }
        video.classList.add('active');
        video.classList.toggle('hidden', !showCameraCheck.checked);
        canvas.classList.add('active');
        placeholder.style.display = 'none';
        stopBtn.disabled = false;
        statusEl.textContent = 'Live';
        statusEl.classList.add('on');
        updateFeedback(0);
        resizeCanvas();
        logAction('Starting video.play()');
        try {
          await video.play();
          logAction('video.play() OK');
        } catch (playErr) {
          logAction('video.play() failed: ' + (playErr && playErr.message));
          console.warn('[Camera] video.play:', playErr);
        }
        if (!faceLandmarker) {
          const ok = await loadDeps();
          if (!ok || !FilesetResolver || !FaceLandmarker) {
            logAction('ERROR: Face Landmarker deps not loaded');
            throw new Error('Could not load MediaPipe');
          }
          logAction('Loading Face Landmarker model…');
          const vision = await FilesetResolver.forVisionTasks(
            'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm'
          );
          faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: {
              modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task'
            },
            runningMode: 'VIDEO',
            numFaces: 1
          });
          logAction('Face Landmarker loaded');
        }
        lastVideoTime = -1;
        logAction('Camera started OK — readyState=' + video.readyState + ' videoWidth=' + video.videoWidth);
        video.onloadedmetadata = () => { logAction('onloadedmetadata fired, starting face loop'); detectFaceLoop(); };
        if (video.readyState >= 2) { logAction('Video already ready, starting face loop now'); detectFaceLoop(); }
      } catch (err) {
        logAction('ERROR: ' + (err.name || '') + ' ' + (err.message || err));
        startBtn.disabled = false;
        let msg = err.message || 'Unknown error';
        if (err.name === 'NotAllowedError') msg = 'Permission denied. Allow camera access in your browser.';
        if (err.name === 'NotFoundError') msg = 'No camera found on this device.';
        if (err.name === 'NotReadableError') msg = 'Camera is in use by another app.';
        setError(msg);
        updateDebugPanel();
      }
    }

    function stopCamera() {
      if (detectInterval) {
        clearTimeout(detectInterval);
        detectInterval = null;
      }
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(t => t.stop());
      }
      video.srcObject = null;
      video.classList.remove('active');
      canvas.classList.remove('active');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      placeholder.style.display = 'block';
      clearError();
      startBtn.disabled = false;
      stopBtn.disabled = true;
      statusEl.textContent = 'Off';
      statusEl.classList.remove('on');
      updateFeedback(0);
    }

    faceDotsCheck.addEventListener('change', () => { if (stream) updateFeedback(1); updateDebugPanel(); });
    showMaskCheck.addEventListener('change', () => { if (stream) updateFeedback(1); updateDebugPanel(); });
    debugCheck.addEventListener('change', () => { updateDebugPanel(); debugPanel.classList.toggle('visible', debugCheck.checked); });

    showCameraCheck.addEventListener('change', () => {
      video.classList.toggle('hidden', !showCameraCheck.checked);
    });

    dropMeshBtn.addEventListener('click', () => {
      createPhysicsBodiesFromMesh();
    });

    resetPhysicsBtn.addEventListener('click', () => {
      physicsActive = false;
      if (matterWorld) World.clear(matterWorld);
      if (ctx) { ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,canvas.width,canvas.height); ctx.restore(); }
    });

    logAction('Script loaded, attaching Start camera listener');
    startBtn.addEventListener('click', () => {
      logAction('Start camera button click fired');
      startCamera();
    });
    logAction('Start camera listener attached');

    maskFileBtn.addEventListener('click', () => maskFileInput.click());
    maskFileInput.addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const img = new Image();
      img.onload = () => {
        maskImage = img;
        showMaskCheck.checked = true;
        showMaskCheck.disabled = false;
      };
      img.onerror = () => { maskImage = null; };
      img.src = URL.createObjectURL(file);
    });

    faceDotsCheck.addEventListener('change', () => {
      if (!faceDotsCheck.checked) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    });

    showMaskCheck.disabled = true;

    stopBtn.addEventListener('click', stopCamera);

    window.addEventListener('beforeunload', () => {
      if (stream) stream.getTracks().forEach(t => t.stop());
      if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
    });

    (async function takeOverIfCameraAlreadyRunning() {
      if (!video.srcObject || !video.srcObject.getTracks || video.srcObject.getTracks().length === 0) return;
      logAction('Camera already running (inline), taking over…');
      stream = video.srcObject;
      placeholder.style.display = 'none';
      canvas.classList.add('active');
      video.classList.add('active');
      stopBtn.disabled = false;
      statusEl.textContent = 'Live';
      statusEl.classList.add('on');
      updateFeedback(0);
      resizeCanvas();
      const ok = await loadDeps();
      if (!ok || !FilesetResolver || !FaceLandmarker) {
        logAction('Deps failed — face/mesh will not work');
        return;
      }
      if (!faceLandmarker) {
        try {
          const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm');
          faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: {
              modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task'
            },
            runningMode: 'VIDEO',
            numFaces: 1
          });
          logAction('Face Landmarker loaded (takeover)');
        } catch (e) {
          logAction('Face Landmarker load failed: ' + (e && e.message ? e.message : e));
          return;
        }
      }
      lastVideoTime = -1;
      video.onloadedmetadata = () => detectFaceLoop();
      if (video.readyState >= 2) detectFaceLoop();
      logAction('Takeover done — buttons and mesh should work');
    })();
  </script>
</body>
</html>
