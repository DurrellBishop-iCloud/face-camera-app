<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Face Camera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #6366f1;
      --accent2: #818cf8;
      --bg: #0c0c10;
      --surface: rgba(16, 16, 22, 0.96);
      --border: rgba(255,255,255,0.08);
      --text: #e8e8ed;
      --muted: #6b6b82;
      --success: #34d399;
      --warn: #fbbf24;
      --error: #f87171;
      --toggle-off: #2a2a38;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'DM Sans', system-ui, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Video & Canvas ── */
    #video, #canvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #video { display: none; }
    #video.active { display: block; }
    #video.hidden { opacity: 0; }
    #canvas { pointer-events: none; display: none; }
    #canvas.active { display: block; }

    /* ── Tap-to-start overlay ── */
    .tap-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, rgba(99,102,241,0.15) 0%, rgba(0,0,0,0.92) 70%);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      gap: 1.5rem;
      cursor: pointer;
      user-select: none;
    }
    .tap-overlay.visible { opacity: 1; pointer-events: all; }
    .tap-overlay.hiding { opacity: 0; pointer-events: none; }

    .tap-rings {
      position: relative;
      width: 120px; height: 120px;
      display: flex; align-items: center; justify-content: center;
    }
    .tap-rings::before, .tap-rings::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      border: 1.5px solid var(--accent);
      animation: ripple 2.4s ease-out infinite;
    }
    .tap-rings::before { width: 100%; height: 100%; animation-delay: 0s; }
    .tap-rings::after  { width: 140%; height: 140%; animation-delay: 0.8s; }
    @keyframes ripple {
      0%   { opacity: 0.6; transform: scale(0.85); }
      100% { opacity: 0;   transform: scale(1.15); }
    }
    .tap-icon-wrap {
      width: 80px; height: 80px;
      background: rgba(99,102,241,0.18);
      border: 1.5px solid rgba(99,102,241,0.5);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 1;
    }
    .tap-icon-wrap svg { width: 34px; height: 34px; color: var(--accent2); }
    .tap-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:0.5} 50%{opacity:1} }

    /* ── Error overlay ── */
    .error-overlay {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 190;
      gap: 1rem;
      padding: 2rem;
      text-align: center;
    }
    .error-overlay.visible { display: flex; }
    .error-overlay .err-icon { font-size: 2.5rem; }
    .error-overlay .err-msg { color: var(--error); font-size: 0.95rem; max-width: 300px; line-height: 1.5; }
    .error-overlay .retry-btn {
      margin-top: 0.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 100px;
      padding: 0.6rem 1.5rem;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
    }

    /* ── Menu FAB ── */
    .menu-fab {
      position: fixed;
      bottom: calc(2rem + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%);
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(20,20,28,0.7);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      color: var(--text);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 150;
      transition: background 0.2s, box-shadow 0.3s, transform 0.15s;
      box-shadow: 0 2px 20px rgba(0,0,0,0.5);
      outline: none;
    }
    .menu-fab:active { transform: translateX(-50%) scale(0.93); }
    .menu-fab.cam-on { box-shadow: 0 0 0 2px var(--success), 0 2px 20px rgba(0,0,0,0.5); }
    .menu-fab.face-on { box-shadow: 0 0 0 2px var(--accent), 0 2px 20px rgba(0,0,0,0.5); }
    .menu-fab svg { width: 20px; height: 20px; }

    /* ── Drawer backdrop ── */
    .drawer-bg {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 155;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .drawer-bg.visible { opacity: 1; pointer-events: all; }

    /* ── Drawer ── */
    .drawer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      z-index: 160;
      padding: 0 1.25rem calc(1.5rem + var(--safe-bottom));
      max-height: 82vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .drawer.open { transform: translateY(0); }
    .drawer-handle {
      width: 36px; height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin: 12px auto 16px;
    }
    .drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
    }
    .drawer-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }
    .cam-status {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .cam-status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .cam-status-dot.on { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .cam-status-dot.face { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

    /* ── Control rows ── */
    .ctrl-section {
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    .ctrl-section:last-child { border-bottom: none; }
    .ctrl-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.7rem 0;
      gap: 1rem;
    }
    .ctrl-row .ctrl-label {
      font-size: 0.9rem;
      color: var(--text);
      flex: 1;
    }
    .ctrl-row .ctrl-sub {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      display: inline-block;
      width: 44px; height: 26px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle .slider {
      position: absolute; inset: 0;
      background: var(--toggle-off);
      border-radius: 13px;
      transition: background 0.22s;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      height: 20px; width: 20px;
      left: 3px; bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.22s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .toggle input:checked + .slider { background: var(--accent); }
    .toggle input:checked + .slider::before { transform: translateX(18px); }
    .toggle input:disabled + .slider { opacity: 0.4; cursor: not-allowed; }

    /* Drawer buttons */
    .drawer-actions {
      display: flex; gap: 0.75rem;
      padding: 0.75rem 0;
      flex-wrap: wrap;
    }
    .drawer-btn {
      flex: 1;
      min-width: 100px;
      padding: 0.65rem 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
      text-align: center;
    }
    .drawer-btn:active { transform: scale(0.97); }
    .drawer-btn:hover { background: rgba(255,255,255,0.1); }
    .drawer-btn.accent {
      background: var(--accent);
      border-color: transparent;
      color: #fff;
    }
    .drawer-btn.accent:hover { background: var(--accent2); }

    /* Debug panel */
    .debug-panel {
      display: none;
      margin-top: 0.5rem;
      padding: 0.75rem;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: ui-monospace, monospace;
      font-size: 0.68rem;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 10rem;
      overflow: auto;
    }
    .debug-panel.visible { display: block; }
  </style>
</head>
<body>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <!-- Tap to start -->
  <div id="tapOverlay" class="tap-overlay" role="button" aria-label="Tap to start camera">
    <div class="tap-rings">
      <div class="tap-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
      </div>
    </div>
    <p class="tap-label">tap to start</p>
  </div>

  <!-- Error overlay -->
  <div id="errorOverlay" class="error-overlay" role="alert">
    <div class="err-icon">⚠</div>
    <p id="errorText" class="err-msg"></p>
    <button class="retry-btn" id="retryBtn">Try again</button>
  </div>

  <!-- Menu FAB -->
  <button class="menu-fab" id="menuBtn" aria-label="Open controls">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="6"  x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <!-- Drawer backdrop -->
  <div class="drawer-bg" id="drawerBg"></div>

  <!-- Controls drawer -->
  <div class="drawer" id="drawer">
    <div class="drawer-handle"></div>

    <div class="drawer-header">
      <span class="drawer-title">Controls</span>
      <span class="cam-status">
        <span class="cam-status-dot" id="camDot"></span>
        <span id="camStatusText">Off</span>
      </span>
    </div>

    <div class="ctrl-section">
      <div class="ctrl-row">
        <div><div class="ctrl-label">Face dots</div></div>
        <label class="toggle"><input type="checkbox" id="faceDots" checked><span class="slider"></span></label>
      </div>
      <div class="ctrl-row">
        <div><div class="ctrl-label">Colour mesh</div></div>
        <label class="toggle"><input type="checkbox" id="colorTestCheck"><span class="slider"></span></label>
      </div>
      <div class="ctrl-row">
        <div><div class="ctrl-label">Colours from camera</div></div>
        <label class="toggle"><input type="checkbox" id="colorFromCameraCheck"><span class="slider"></span></label>
      </div>
      <div class="ctrl-row">
        <div><div class="ctrl-label">Triangle edges</div></div>
        <label class="toggle"><input type="checkbox" id="triangleStrokeCheck" checked><span class="slider"></span></label>
      </div>
      <div class="ctrl-row">
        <div><div class="ctrl-label">Show camera</div></div>
        <label class="toggle"><input type="checkbox" id="showCameraCheck" checked><span class="slider"></span></label>
      </div>
    </div>

    <div class="ctrl-section">
      <div class="ctrl-row">
        <div><div class="ctrl-label">Mask image</div></div>
        <label class="toggle"><input type="checkbox" id="showMask" disabled><span class="slider"></span></label>
      </div>
      <div class="drawer-actions">
        <button class="drawer-btn" id="maskFileBtn">Choose image…</button>
        <input type="file" id="maskFile" accept="image/*" hidden>
      </div>
    </div>

    <div class="ctrl-section">
      <div class="drawer-actions">
        <button class="drawer-btn accent" id="dropMeshBtn">Drop mesh</button>
        <button class="drawer-btn" id="resetPhysicsBtn">Reset</button>
      </div>
    </div>

    <div class="ctrl-section">
      <div class="ctrl-row">
        <div><div class="ctrl-label" style="color:var(--muted);font-size:0.8rem">Debug info</div></div>
        <label class="toggle"><input type="checkbox" id="debugCheck"><span class="slider"></span></label>
      </div>
      <div id="debugPanel" class="debug-panel"></div>
    </div>
  </div>

  <!-- Hidden JS-required elements -->
  <button id="startBtn" style="display:none" aria-hidden="true"></button>
  <button id="stopBtn"  style="display:none" aria-hidden="true"></button>
  <span   id="status"   style="display:none" aria-hidden="true"></span>
  <div    id="errorBanner" style="display:none" aria-hidden="true"></div>
  <div    id="placeholder" style="display:none" aria-hidden="true"></div>
  <div    id="actionLog"   style="display:none" aria-hidden="true"></div>
  <div    id="feedback"    style="display:none" aria-hidden="true">
    <span id="feedbackCamera"></span>
    <span id="feedbackFace"></span>
    <span id="feedbackMask"></span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js" crossorigin="anonymous"></script>
  <script type="module">
    let FaceLandmarker = null;
    let FilesetResolver = null;
    let Delaunay = null;

    const Matter = globalThis.Matter;
    const Engine = Matter?.Engine;
    const World  = Matter?.World;
    const Bodies = Matter?.Bodies;
    const Body   = Matter?.Body;

    const video              = document.getElementById('video');
    const canvas             = document.getElementById('canvas');
    const ctx                = canvas.getContext('2d');
    const startBtn           = document.getElementById('startBtn');
    const stopBtn            = document.getElementById('stopBtn');
    const statusEl           = document.getElementById('status');
    const faceDotsCheck      = document.getElementById('faceDots');
    const showMaskCheck      = document.getElementById('showMask');
    const maskFileInput      = document.getElementById('maskFile');
    const maskFileBtn        = document.getElementById('maskFileBtn');
    const colorTestCheck     = document.getElementById('colorTestCheck');
    const colorFromCameraCheck = document.getElementById('colorFromCameraCheck');
    const triangleStrokeCheck  = document.getElementById('triangleStrokeCheck');
    const showCameraCheck    = document.getElementById('showCameraCheck');
    const dropMeshBtn        = document.getElementById('dropMeshBtn');
    const resetPhysicsBtn    = document.getElementById('resetPhysicsBtn');
    const debugCheck         = document.getElementById('debugCheck');
    const debugPanel         = document.getElementById('debugPanel');
    const tapOverlay         = document.getElementById('tapOverlay');
    const errorOverlay       = document.getElementById('errorOverlay');
    const errorText          = document.getElementById('errorText');
    const retryBtn           = document.getElementById('retryBtn');
    const menuBtn            = document.getElementById('menuBtn');
    const drawer             = document.getElementById('drawer');
    const drawerBg           = document.getElementById('drawerBg');
    const camDot             = document.getElementById('camDot');
    const camStatusText      = document.getElementById('camStatusText');

    let stream = null;
    let lastPointsForPhysics = null;
    let lastMeshColors = null;
    let matterEngine = null;
    let matterWorld  = null;
    let physicsActive = false;
    let debugInfo = {};
    let faceLandmarker = null;
    let detectInterval = null;
    let lastVideoTime  = -1;
    let maskImage = null;
    let sampleCanvas = null;
    let sampleCtx = null;
    let lastError = null;

    function log(msg) { try { console.log('[FaceCam]', msg); } catch(e){} }

    // ── Drawer ──────────────────────────────────────
    function openDrawer()  { drawer.classList.add('open'); drawerBg.classList.add('visible'); }
    function closeDrawer() { drawer.classList.remove('open'); drawerBg.classList.remove('visible'); }
    menuBtn.addEventListener('click', () => drawer.classList.contains('open') ? closeDrawer() : openDrawer());
    drawerBg.addEventListener('click', closeDrawer);

    // ── Status indicator ─────────────────────────────
    function updateStatus(faceCount) {
      if (!stream) {
        camDot.className = 'cam-status-dot';
        camStatusText.textContent = 'Off';
        menuBtn.classList.remove('cam-on','face-on');
        return;
      }
      if (faceCount > 0) {
        camDot.className = 'cam-status-dot face';
        camStatusText.textContent = 'Face detected';
        menuBtn.classList.remove('cam-on'); menuBtn.classList.add('face-on');
      } else {
        camDot.className = 'cam-status-dot on';
        camStatusText.textContent = 'Camera on';
        menuBtn.classList.remove('face-on'); menuBtn.classList.add('cam-on');
      }
    }

    // ── Error ────────────────────────────────────────
    function setError(msg) {
      lastError = msg;
      errorText.textContent = msg;
      errorOverlay.classList.add('visible');
      log('Error: ' + msg);
    }
    function clearError() {
      lastError = null;
      errorOverlay.classList.remove('visible');
    }

    // ── Deps ─────────────────────────────────────────
    async function loadDeps() {
      if (FaceLandmarker && Delaunay) return true;
      try {
        const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs');
        FaceLandmarker = vision.FaceLandmarker;
        FilesetResolver = vision.FilesetResolver;
        log('MediaPipe loaded');
      } catch(e) { log('MediaPipe failed: ' + e.message); }
      try {
        const d3 = await import('https://cdn.skypack.dev/d3-delaunay@6');
        Delaunay = d3.Delaunay;
        log('Delaunay loaded');
      } catch(e) { log('Delaunay failed: ' + e.message); }
      return !!(FaceLandmarker && Delaunay);
    }

    // ── Canvas ───────────────────────────────────────
    function resizeCanvas() {
      if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }
    }
    window.addEventListener('resize', resizeCanvas);

    // ── Sample canvas ────────────────────────────────
    function ensureSampleCanvas() {
      const vw = video.videoWidth, vh = video.videoHeight;
      if (!vw || !vh) return false;
      if (!sampleCanvas || sampleCanvas.width !== vw || sampleCanvas.height !== vh) {
        sampleCanvas = document.createElement('canvas');
        sampleCanvas.width = vw; sampleCanvas.height = vh;
        sampleCtx = sampleCanvas.getContext('2d');
      }
      sampleCtx.drawImage(video, 0, 0, vw, vh);
      return true;
    }

    function sampleVideoAtCanvasPoint(cx, cy) {
      const vw = video.videoWidth, vh = video.videoHeight;
      if (!sampleCanvas || !sampleCtx || !vw || !vh) return null;
      const scale = Math.max(canvas.width / vw, canvas.height / vh);
      const ox = (canvas.width  - vw * scale) / 2;
      const oy = (canvas.height - vh * scale) / 2;
      const x = Math.floor(Math.max(0, Math.min(vw - 1, (cx - ox) / scale)));
      const y = Math.floor(Math.max(0, Math.min(vh - 1, (cy - oy) / scale)));
      const d = sampleCtx.getImageData(x, y, 1, 1).data;
      return 'rgb(' + d[0] + ',' + d[1] + ',' + d[2] + ')';
    }

    // ── Keypoints ────────────────────────────────────
    function keypointsToCanvas(keypoints) {
      const vw = video.videoWidth, vh = video.videoHeight;
      if (!vw || !vh) return keypoints.map(k => ({ x: k.x * canvas.width, y: k.y * canvas.height }));
      const scale = Math.max(canvas.width / vw, canvas.height / vh);
      const ox = (canvas.width  - vw * scale) / 2;
      const oy = (canvas.height - vh * scale) / 2;
      return keypoints.map(k => {
        const nx = k.x > 1 ? k.x / vw : k.x;
        const ny = k.y > 1 ? k.y / vh : k.y;
        return { x: nx * vw * scale + ox, y: ny * vh * scale + oy };
      });
    }

    function getFaceQuad(points) {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      points.forEach(p => { minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x); minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y); });
      const px = (maxX - minX) * 0.05, py = (maxY - minY) * 0.05;
      return [
        { x: minX - px, y: minY - py }, { x: maxX + px, y: minY - py },
        { x: maxX + px, y: maxY + py }, { x: minX - px, y: maxY + py }
      ];
    }

    // ── Affine warp ──────────────────────────────────
    function solveAffine(src, dst) {
      const [p1,p2,p3] = src, [q1,q2,q3] = dst;
      const det = p1.x*(p2.y-p3.y) - p1.y*(p2.x-p3.x) + p2.x*p3.y - p3.x*p2.y;
      if (Math.abs(det) < 1e-10) return null;
      const a = (q1.x*(p2.y-p3.y)+q2.x*(p3.y-p1.y)+q3.x*(p1.y-p2.y))/det;
      const c = (q1.y*(p2.y-p3.y)+q2.y*(p3.y-p1.y)+q3.y*(p1.y-p2.y))/det;
      const e = (q1.x*(p2.x*p3.y-p3.x*p2.y)+q2.x*(p3.x*p1.y-p1.x*p3.y)+q3.x*(p1.x*p2.y-p2.x*p1.y))/det;
      const b = (q1.x*(p2.x-p3.x)+q2.x*(p3.x-p1.x)+q3.x*(p1.x-p2.x))/det;
      const d = (q1.y*(p2.x-p3.x)+q2.y*(p3.x-p1.x)+q3.y*(p1.x-p2.x))/det;
      const f = (q1.y*(p2.x*p3.y-p3.x*p2.y)+q2.y*(p3.x*p1.y-p1.x*p3.y)+q3.y*(p1.x*p2.y-p2.x*p1.y))/det;
      return { a,b,c,d,e,f };
    }

    function drawImageWarpedToQuad(img, quad) {
      const w = img.width, h = img.height;
      const minX = Math.min(quad[0].x,quad[1].x,quad[2].x,quad[3].x);
      const maxX = Math.max(quad[0].x,quad[1].x,quad[2].x,quad[3].x);
      const minY = Math.min(quad[0].y,quad[1].y,quad[2].y,quad[3].y);
      const maxY = Math.max(quad[0].y,quad[1].y,quad[2].y,quad[3].y);
      if ((maxX-minX)*(maxY-minY) < 100) return;
      const t1 = solveAffine([{x:0,y:0},{x:w,y:0},{x:w,y:h}],[quad[0],quad[1],quad[2]]);
      const t2 = solveAffine([{x:0,y:0},{x:w,y:h},{x:0,y:h}],[quad[0],quad[2],quad[3]]);
      if (!t1 || !t2) { ctx.drawImage(img, minX, minY, maxX-minX, maxY-minY); return; }
      ctx.save();
      ctx.beginPath(); ctx.moveTo(quad[0].x,quad[0].y); ctx.lineTo(quad[1].x,quad[1].y); ctx.lineTo(quad[2].x,quad[2].y); ctx.lineTo(quad[3].x,quad[3].y); ctx.closePath(); ctx.clip();
      ctx.save(); ctx.beginPath(); ctx.moveTo(quad[0].x,quad[0].y); ctx.lineTo(quad[1].x,quad[1].y); ctx.lineTo(quad[2].x,quad[2].y); ctx.closePath(); ctx.clip();
      ctx.setTransform(t1.a,t1.b,t1.c,t1.d,t1.e,t1.f); ctx.drawImage(img,0,0,w,h); ctx.restore();
      ctx.save(); ctx.beginPath(); ctx.moveTo(quad[0].x,quad[0].y); ctx.lineTo(quad[2].x,quad[2].y); ctx.lineTo(quad[3].x,quad[3].y); ctx.closePath(); ctx.clip();
      ctx.setTransform(t2.a,t2.b,t2.c,t2.d,t2.e,t2.f); ctx.drawImage(img,0,0,w,h); ctx.restore();
      ctx.restore();
    }

    function triangleArea(a, b, c) {
      return 0.5 * Math.abs((b.x-a.x)*(c.y-a.y) - (c.x-a.x)*(b.y-a.y));
    }

    // ── Colour mesh ──────────────────────────────────
    function drawColorTestMesh(points) {
      if (!Delaunay || !points || points.length < 3) return 0;
      lastPointsForPhysics = points;
      lastMeshColors = [];
      let useCameraColor = colorFromCameraCheck.checked;
      if (useCameraColor && !ensureSampleCanvas()) useCameraColor = false;
      const pts = points.map(p => [p.x, p.y]);
      const delaunay = Delaunay.from(pts);
      const triangles = delaunay.triangles;
      const areas = [];
      let minArea = Infinity, maxArea = -Infinity;
      for (let i = 0; i < triangles.length; i += 3) {
        const area = triangleArea(points[triangles[i]], points[triangles[i+1]], points[triangles[i+2]]);
        areas.push(area);
        if (area < minArea) minArea = area;
        if (area > maxArea) maxArea = area;
      }
      const range = maxArea - minArea || 1;
      ctx.save(); ctx.setTransform(1,0,0,1,0,0);
      for (let i = 0; i < triangles.length; i += 3) {
        const a = points[triangles[i]], b = points[triangles[i+1]], c = points[triangles[i+2]];
        let fill;
        if (useCameraColor) {
          fill = sampleVideoAtCanvasPoint((a.x+b.x+c.x)/3, (a.y+b.y+c.y)/3) || 'rgb(128,128,128)';
        } else {
          const g = Math.round(45 + ((areas[i/3]-minArea)/range) * 195);
          fill = 'rgb('+g+','+g+','+g+')';
        }
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.closePath();
        ctx.fillStyle = fill; ctx.fill();
        if (triangleStrokeCheck.checked) { ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=0.5; ctx.stroke(); }
        lastMeshColors.push(fill);
      }
      ctx.restore();
      return triangles.length / 3;
    }

    // ── Physics ──────────────────────────────────────
    function createPhysicsBodiesFromMesh() {
      if (!Delaunay || !lastPointsForPhysics || lastPointsForPhysics.length < 3) return;
      if (!Matter || !Matter.Engine) return;
      if (!matterEngine) {
        matterEngine = Engine.create();
        matterWorld  = matterEngine.world;
      }
      World.clear(matterWorld);
      matterEngine.gravity.x = 0;
      matterEngine.gravity.y = 1;
      matterEngine.gravity.scale = 0.0012;

      const W = canvas.width, H = canvas.height;
      const now = Date.now();

      World.add(matterWorld, [
        Bodies.rectangle(W/2, H+30,  W+200, 60, { isStatic:true, restitution:0.55, friction:0.3 }),
        Bodies.rectangle(-30, H/2,   60, H+200, { isStatic:true }),
        Bodies.rectangle(W+30, H/2,  60, H+200, { isStatic:true })
      ]);

      let useCameraColor = colorFromCameraCheck.checked;
      if (useCameraColor) ensureSampleCanvas();

      const pts = lastPointsForPhysics.map(p => [p.x, p.y]);
      const delaunay = Delaunay.from(pts);
      const triangles = delaunay.triangles;

      for (let i = 0; i < triangles.length; i += 3) {
        const a = lastPointsForPhysics[triangles[i]];
        const b = lastPointsForPhysics[triangles[i+1]];
        const c = lastPointsForPhysics[triangles[i+2]];
        const cx = (a.x+b.x+c.x)/3, cy = (a.y+b.y+c.y)/3;
        const verts = [{x:a.x-cx,y:a.y-cy},{x:b.x-cx,y:b.y-cy},{x:c.x-cx,y:c.y-cy}];
        let body = Bodies.fromVertices(cx, cy, verts, {
          friction:0.2, restitution:0.5+Math.random()*0.25,
          density:0.002, frictionAir:0.008+Math.random()*0.016, slop:0.01
        });
        if (!body) {
          const r = (Math.hypot(a.x-cx,a.y-cy)+Math.hypot(b.x-cx,b.y-cy)+Math.hypot(c.x-cx,c.y-cy))/3;
          body = Bodies.polygon(cx, cy, 3, Math.max(8,r), {friction:0.2,restitution:0.5,density:0.002,frictionAir:0.01});
        }
        if (!body) continue;
        Body.setVelocity(body, { x:(Math.random()-0.5)*3, y:0 });
        body.birthTime = now; body.alpha = 1.0;
        if (useCameraColor && sampleCtx) {
          body.fillStyle = sampleVideoAtCanvasPoint(cx, cy) || 'rgb(128,128,128)';
        } else {
          const t = Math.min(1, triangleArea(a,b,c) / 5000);
          const g = Math.round(45 + t * 195);
          body.fillStyle = 'rgb('+g+','+g+','+g+')';
        }
        World.add(matterWorld, body);
      }

      physicsActive = true;
      const FADE_DELAY = 1800, FADE_DUR = 1400;

      function physicsLoop() {
        if (!physicsActive || !matterEngine) return;
        requestAnimationFrame(physicsLoop);
        Engine.update(matterEngine, 1000/60);
        const t2 = Date.now();
        const all = matterWorld.bodies;
        const remove = [];
        ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,W,H);
        for (let i = 0; i < all.length; i++) {
          const body = all[i];
          if (body.isStatic) continue;
          const age = t2 - body.birthTime;
          if (age > FADE_DELAY) body.alpha = 1 - (age-FADE_DELAY)/FADE_DUR;
          if (body.alpha <= 0) { remove.push(body); continue; }
          const verts = body.vertices;
          if (!verts || !verts.length) continue;
          ctx.globalAlpha = Math.max(0, Math.min(1, body.alpha));
          ctx.beginPath(); ctx.moveTo(verts[0].x, verts[0].y);
          for (let j = 1; j < verts.length; j++) ctx.lineTo(verts[j].x, verts[j].y);
          ctx.closePath();
          ctx.fillStyle = body.fillStyle || 'rgb(128,128,128)'; ctx.fill();
          if (triangleStrokeCheck.checked) { ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=0.5; ctx.stroke(); }
        }
        ctx.globalAlpha = 1; ctx.restore();
        remove.forEach(b => World.remove(matterWorld, b));
        if (all.filter(b=>!b.isStatic).length === 0) physicsActive = false;
      }
      physicsLoop();
    }

    // ── Debug panel ──────────────────────────────────
    function updateDebugPanel() {
      if (!debugCheck.checked) return;
      debugPanel.textContent = [
        'stream: '  + (stream ? 'active' : 'null'),
        'video: '   + (video.videoWidth||0) + '×' + (video.videoHeight||0),
        'canvas: '  + canvas.width + '×' + canvas.height,
        'MediaPipe: '+ (FaceLandmarker ? 'loaded' : 'not loaded'),
        'Delaunay: ' + (Delaunay ? 'loaded' : 'not loaded'),
        'Matter: '  + (Matter?.Engine ? 'loaded' : 'not loaded'),
        'lastError: '+ (lastError || '—'),
      ].join('\n');
    }

    // ── Face drawing ─────────────────────────────────
    function drawFaceDots(faceLandmarks) {
      const faceCount = faceLandmarks?.length ?? 0;
      updateStatus(faceCount);
      if (physicsActive) return;
      if (!faceLandmarks || !faceLandmarks.length) { updateDebugPanel(); return; }
      resizeCanvas();
      const points = keypointsToCanvas(faceLandmarks[0]);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const quad = getFaceQuad(points);
      if (colorTestCheck.checked) {
        drawColorTestMesh(points);
      } else if (maskImage && showMaskCheck.checked) {
        drawImageWarpedToQuad(maskImage, quad);
      }
      if (faceDotsCheck.checked) {
        points.forEach(p => {
          ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(99,102,241,0.9)'; ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 0.5; ctx.stroke();
        });
      }
      updateDebugPanel();
    }

    // ── Face loop ────────────────────────────────────
    async function detectFaceLoop() {
      if (!stream || !video.videoWidth || !faceLandmarker) return;
      const t = video.currentTime;
      if (t === lastVideoTime) { if (stream) detectInterval = setTimeout(detectFaceLoop, 50); return; }
      lastVideoTime = t;
      try {
        const result = faceLandmarker.detectForVideo(video, t * 1000);
        const faces = result.faceLandmarks ?? [];
        drawFaceDots(faces.length ? result.faceLandmarks : []);
      } catch(e) { updateStatus(0); }
      if (stream) detectInterval = setTimeout(detectFaceLoop, 50);
    }

    // ── Start camera ─────────────────────────────────
    async function startCamera() {
      clearError();
      try {
        if (video.srcObject?.getTracks?.().length > 0) {
          stream = video.srcObject;
          log('Reusing existing stream');
        } else {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { width:{ideal:1280}, height:{ideal:720}, facingMode:'user' },
            audio: false
          });
          video.srcObject = stream;
        }
        video.classList.add('active');
        video.classList.toggle('hidden', !showCameraCheck.checked);
        canvas.classList.add('active');
        resizeCanvas();
        await video.play().catch(e => log('play warn: '+e.message));

        if (!faceLandmarker) {
          await loadDeps();
          if (FilesetResolver && FaceLandmarker) {
            const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm');
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
              baseOptions: { modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task' },
              runningMode: 'VIDEO', numFaces: 1
            });
            log('Face Landmarker ready');
          }
        }
        lastVideoTime = -1;
        video.onloadedmetadata = () => detectFaceLoop();
        if (video.readyState >= 2) detectFaceLoop();
        updateStatus(0);
        return true;
      } catch(err) {
        stream = null;
        let msg = err.message || 'Unknown error';
        if (err.name === 'NotAllowedError') msg = 'Camera permission denied. Please allow camera access and try again.';
        if (err.name === 'NotFoundError')   msg = 'No camera found on this device.';
        if (err.name === 'NotReadableError') msg = 'Camera is in use by another app.';
        setError(msg);
        throw err;
      }
    }

    // ── Event listeners ──────────────────────────────
    showCameraCheck.addEventListener('change', () => video.classList.toggle('hidden', !showCameraCheck.checked));
    debugCheck.addEventListener('change', () => { debugPanel.classList.toggle('visible', debugCheck.checked); updateDebugPanel(); });
    dropMeshBtn.addEventListener('click', () => createPhysicsBodiesFromMesh());
    resetPhysicsBtn.addEventListener('click', () => {
      physicsActive = false;
      if (matterWorld) World.clear(matterWorld);
      ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,canvas.width,canvas.height); ctx.restore();
    });
    maskFileBtn.addEventListener('click', () => maskFileInput.click());
    maskFileInput.addEventListener('change', e => {
      const file = e.target.files?.[0];
      if (!file) return;
      const img = new Image();
      img.onload = () => { maskImage = img; showMaskCheck.checked = true; showMaskCheck.disabled = false; };
      img.onerror = () => { maskImage = null; };
      img.src = URL.createObjectURL(file);
    });
    retryBtn.addEventListener('click', () => {
      clearError();
      tapOverlay.classList.add('visible');
      document.addEventListener('click', launchFromTap, { once: true });
    });
    window.addEventListener('beforeunload', () => {
      if (stream) stream.getTracks().forEach(t => t.stop());
    });

    // ── Auto-start ───────────────────────────────────
    async function launchFromTap() {
      tapOverlay.classList.add('hiding');
      setTimeout(() => tapOverlay.classList.remove('visible','hiding'), 400);
      await startCamera().catch(() => {});
    }

    (async function init() {
      // Try to start automatically — works if camera permission was already granted
      try {
        await startCamera();
        // Succeeded without user gesture (permission cached)
        tapOverlay.classList.remove('visible');
      } catch(e) {
        // Need a user gesture — show beautiful tap screen
        tapOverlay.classList.add('visible');
        document.addEventListener('click', launchFromTap, { once: true });
      }
    })();
  </script>
</body>
</html>
